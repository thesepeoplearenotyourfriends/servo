name: Warm Severin Page Probe Build

on:
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  RUST_BACKTRACE: 1
  SHELL: /bin/bash
  CC: clang
  CXX: clang++
  CARGO_TARGET_DIR: /var/servo-cargo-target
  UV_PROJECT_ENVIRONMENT: .devcontainer-venv

jobs:
  warm-severin-page-probe:
    name: Debian 12 warm Severin page probe
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    container:
      image: debian:12

    steps:
      - name: Install restore bootstrap
        run: |
          set -Eeuo pipefail

          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            git \
            tar \
            zstd \
            gh \
            python3

      - name: Download and restore warm state
        id: warm_state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          WARM_TAG="factory-reset-debian12-ubuntu24-warm-state"
          PIECES_DIR="${RUNNER_TEMP}/release-pieces"

          rm -rf "$PIECES_DIR"
          mkdir -p "$PIECES_DIR"

          gh release download "$WARM_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$PIECES_DIR" \
            --clobber \
            --pattern 'SHA256SUMS'

          mapfile -t expected_piece_names < <(
            awk '{print $2}' "$PIECES_DIR/SHA256SUMS"
          )

          if [ "${#expected_piece_names[@]}" -eq 0 ]; then
            echo "Warm release SHA256SUMS contains no archive pieces." >&2
            exit 1
          fi

          for piece_name in "${expected_piece_names[@]}"; do
            gh release download "$WARM_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --dir "$PIECES_DIR" \
              --clobber \
              --pattern "$piece_name"
          done

          (
            cd "$PIECES_DIR"
            sha256sum -c SHA256SUMS
          )

          mounted_targets() {
            awk '$5 != "/" { print $5 }' /proc/self/mountinfo \
              | while IFS= read -r encoded_path; do
                  printf '%b\n' "$encoded_path"
                done \
              | sort -u
          }

          tar_excludes_for_destination() {
            local destination="$1"
            local mountpoint
            local relative_path

            while IFS= read -r mountpoint; do
              if [ "$destination" = "/" ]; then
                relative_path="${mountpoint#/}"
              else
                case "$mountpoint" in
                  "$destination")
                    continue
                    ;;
                  "$destination"/*)
                    relative_path="${mountpoint#"$destination"/}"
                    ;;
                  *)
                    continue
                    ;;
                esac
              fi

              [ -n "$relative_path" ] || continue
              printf '%s\0' "--exclude=./$relative_path"
            done < <(mounted_targets)
          }

          restore_stream() {
            local stream_name="$1"
            local destination="$2"
            local first_piece="$PIECES_DIR/${stream_name}.part-000"
            local tar_excludes=()
            local exclude_arg

            if [ ! -f "$first_piece" ]; then
              echo "No ${stream_name} stream in warm state; skipping."
              return 0
            fi

            while IFS= read -r -d '' exclude_arg; do
              tar_excludes+=("$exclude_arg")
            done < <(tar_excludes_for_destination "$destination")

            echo "Restoring ${stream_name} into ${destination}"
            cat "$PIECES_DIR"/"${stream_name}".part-* \
              | tar --zstd \
                  --numeric-owner \
                  --acls \
                  --xattrs \
                  "${tar_excludes[@]}" \
                  -xpf - \
                  -C "$destination"
          }

          restore_stream debian-root.tar.zst /
          restore_stream github-home.tar.zst "$HOME"

          if [ -f "$PIECES_DIR/repo-worktree.tar.zst.part-000" ]; then
            echo "has_repo_worktree=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_repo_worktree=false" >> "$GITHUB_OUTPUT"
          fi

          test -d "$CARGO_TARGET_DIR"

      - name: Restore warmed repository worktree
        if: steps.warm_state.outputs.has_repo_worktree == 'true'
        run: |
          set -Eeuo pipefail

          PIECES_DIR="${RUNNER_TEMP}/release-pieces"

          echo "Restoring saved worktree into $GITHUB_WORKSPACE"
          cat "$PIECES_DIR"/repo-worktree.tar.zst.part-* \
            | tar --zstd \
                --numeric-owner \
                --acls \
                --xattrs \
                -xpf - \
                -C "$GITHUB_WORKSPACE"

          test -d "$GITHUB_WORKSPACE/.git"
          test -f "$GITHUB_WORKSPACE/Cargo.toml"

      - name: Checkout source when warm state has no worktree
        if: steps.warm_state.outputs.has_repo_worktree != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Update restored source in place
        if: steps.warm_state.outputs.has_repo_worktree == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          if git -C "$GITHUB_WORKSPACE" remote get-url origin >/dev/null 2>&1; then
            git -C "$GITHUB_WORKSPACE" remote set-url origin \
              "https://github.com/${GITHUB_REPOSITORY}.git"
          else
            git -C "$GITHUB_WORKSPACE" remote add origin \
              "https://github.com/${GITHUB_REPOSITORY}.git"
          fi

          auth="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"

          git -C "$GITHUB_WORKSPACE" \
            -c "http.extraheader=AUTHORIZATION: basic $auth" \
            fetch --no-tags --depth=50 origin "$GITHUB_SHA"

          current_sha="$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)"

          if [ "$current_sha" = "$GITHUB_SHA" ]; then
            echo "Restored worktree already matches requested commit; preserving timestamps."
          elif git -C "$GITHUB_WORKSPACE" merge-base --is-ancestor HEAD FETCH_HEAD; then
            echo "Fast-forwarding restored worktree; unchanged files retain timestamps."
            git -C "$GITHUB_WORKSPACE" merge --ff-only FETCH_HEAD
          else
            echo "Requested commit diverges from warm worktree; resetting source to requested commit."
            git -C "$GITHUB_WORKSPACE" reset --hard FETCH_HEAD
          fi

          test "$(git -C "$GITHUB_WORKSPACE" rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Restore repo-local warm state
        run: |
          set -Eeuo pipefail

          PIECES_DIR="${RUNNER_TEMP}/release-pieces"
          first_piece="$PIECES_DIR/repo-warm.tar.zst.part-000"

          if [ -f "$first_piece" ]; then
            echo "Restoring repo-local warm state into $GITHUB_WORKSPACE"
            cat "$PIECES_DIR"/repo-warm.tar.zst.part-* \
              | tar --zstd \
                  --numeric-owner \
                  --acls \
                  --xattrs \
                  -xpf - \
                  -C "$GITHUB_WORKSPACE"
          else
            echo "No repo-local warm state in this snapshot; continuing."
          fi

          test -d "$CARGO_TARGET_DIR"

          echo "Discarding restored warm-state archive pieces before compilation."
          rm -rf "$PIECES_DIR"

          echo "=== Filesystem headroom before probe build ==="
          df -h "$RUNNER_TEMP" / || true
          df -i "$RUNNER_TEMP" / || true
          

      - name: Reattach restored Rust toolchain
        run: |
          set -Eeuo pipefail

          CARGO_HOME=/usr/local/cargo
          RUSTUP_HOME=/usr/local/rustup
          CARGO_BIN="$CARGO_HOME/bin"

          if [ ! -x "$CARGO_BIN/cargo" ]; then
            echo "Cargo was not restored at $CARGO_BIN/cargo." >&2
            exit 1
          fi

          export CARGO_HOME RUSTUP_HOME
          export PATH="$CARGO_BIN:$PATH"

          printf '%s\n' "$CARGO_BIN" >> "$GITHUB_PATH"
          {
            printf 'CARGO_HOME=%s\n' "$CARGO_HOME"
            printf 'RUSTUP_HOME=%s\n' "$RUSTUP_HOME"
          } >> "$GITHUB_ENV"

          command -v cargo
          cargo --version --verbose
          command -v rustc
          rustc --version --verbose

      - name: Inject bounded page-global probe
        run: |
          set -Eeuo pipefail
          cd "$GITHUB_WORKSPACE"
          python3 .github/scripts/inject_severin_page_probe.py
          git diff --check
          git diff --stat

      - name: Build Severin page-probe extension
        run: |
          set -Eeuo pipefail
          cd "$GITHUB_WORKSPACE"
          cargo build --release -p severin-python

      - name: Package and publish Severin page-probe wheel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          TAG="severin-page-probe"
          WHEEL_NAME="severin_embedded-0.3.0+pageprobe-cp311-cp311-linux_x86_64.whl"
          WHEEL_DIR="${RUNNER_TEMP}/severin-page-probe-wheel"
          WHEEL_ROOT="$WHEEL_DIR/root"
          WHEEL_PATH="$WHEEL_DIR/$WHEEL_NAME"
          DIST_INFO="severin_embedded-0.3.0+pageprobe.dist-info"

          rm -rf "$WHEEL_DIR"
          mkdir -p "$WHEEL_ROOT/$DIST_INFO"

          mapfile -t extension_candidates < <(
            find "$CARGO_TARGET_DIR/release" -maxdepth 1 -type f \
              \( -name 'libseverin.so' -o -name 'severin*.so' \) \
              -print | sort
          )

          if [ "${#extension_candidates[@]}" -ne 1 ]; then
            printf 'Expected exactly one Severin extension; found %s:\n' "${#extension_candidates[@]}" >&2
            printf '  %s\n' "${extension_candidates[@]:-<none>}" >&2
            exit 1
          fi

          cp "${extension_candidates[0]}" \
            "$WHEEL_ROOT/severin_embedded.cpython-311-x86_64-linux-gnu.so"

          cat > "$WHEEL_ROOT/$DIST_INFO/METADATA" <<'EOF'
          Metadata-Version: 2.1
          Name: severin-embedded
          Version: 0.3.0+pageprobe
          Summary: Experimental CPython bindings for the Severin local Servo runtime, with page-global probe wiring.
          EOF

          cat > "$WHEEL_ROOT/$DIST_INFO/WHEEL" <<'EOF'
          Wheel-Version: 1.0
          Generator: severin-page-probe
          Root-Is-Purelib: false
          Tag: cp311-cp311-linux_x86_64
          EOF

          cat > "$WHEEL_ROOT/$DIST_INFO/SEVERIN_PAGE_PROBE.txt" <<EOF
          source_commit=$GITHUB_SHA
          extension_source=${extension_candidates[0]}
          probe_environment=SEVERIN_PROBE=1
          EOF

          python3 - "$WHEEL_ROOT" "$WHEEL_PATH" <<'PY'
          import base64
          import hashlib
          import sys
          import zipfile
          from pathlib import Path

          root = Path(sys.argv[1])
          wheel_path = Path(sys.argv[2])
          dist_infos = sorted(root.glob("*.dist-info"))
          if len(dist_infos) != 1:
              raise SystemExit(f"expected one dist-info directory, found {len(dist_infos)}")

          record_name = f"{dist_infos[0].name}/RECORD"
          files = sorted(
              path for path in root.rglob("*")
              if path.is_file() and path.relative_to(root).as_posix() != record_name
          )

          records = []
          with zipfile.ZipFile(wheel_path, "w", compression=zipfile.ZIP_DEFLATED) as wheel:
              for path in files:
                  arcname = path.relative_to(root).as_posix()
                  data = path.read_bytes()
                  digest = base64.urlsafe_b64encode(hashlib.sha256(data).digest()).decode().rstrip("=")
                  wheel.writestr(arcname, data)
                  records.append(f"{arcname},sha256={digest},{len(data)}")
              records.append(f"{record_name},,")
              wheel.writestr(record_name, "\n".join(records) + "\n")
          PY

          python3 -m zipfile -t "$WHEEL_PATH"
          ls -lh "$WHEEL_PATH"
          python3 -m zipfile -l "$WHEEL_PATH"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" "$WHEEL_PATH" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" "$WHEEL_PATH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Severin page probe" \
              --notes "Current warm Severin page-global probe wheel."
          fi

          release_url="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json url --jq .url)"
          echo "Probe wheel release: $release_url"
          echo "Probe wheel asset:   $WHEEL_NAME"
