<!doctype html>
<meta charset="utf-8">
<title>Severin inherited-FD bridge demo</title>
<link rel="stylesheet" href="styles.css">
<h1>Severin private FD bridge demo</h1>
<p>This fixture exercises animation, pointer/keyboard input, immediate replies, and deferred replies without Python GUI pumping.</p>
<canvas id="canvas" width="420" height="160" tabindex="0"></canvas>
<div class="controls">
  <button id="immediate">Immediate bridge reply</button>
  <button id="deferred">Deferred bridge reply</button>
  <input id="text" placeholder="Keyboard input stays native" />
</div>
<pre id="log"></pre>
<script src="main.js"></script>
